<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>YouTrieur - Login Google</title>
  <style>
    body {
      background: #121212;
      color: #fff;
      font-family: sans-serif;
    }
    .order-overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 2;
      top: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: large;
      font-weight: bold;
      background-color: #00000078;
    }
    .logCont {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .GoogleBut {
      padding: 1em 2em;
      font-size: 1.5em;
      background: #ff0000;
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .GoogleBut:hover {
      transform: scale(1.05);
    }
    .GoogleBut:disabled {
      background: #888;
      color: #ddd;
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
      pointer-events: none;
    }
  </style>
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
  <div class="logCont" id="GoogleC">
    <button class="GoogleBut" id="ToGoogle">Login Google</button>
  </div>
  <script type="module">
    import { fetchPlaylists, fetchVideos } from './client.js';
    
    const googleButton = document.getElementById("ToGoogle");
    const googleContainer = document.getElementById("GoogleC");
    let authCheckInProgress = false;
    
    // Vérifie l’état d’auth au chargement
    checkAuthStatus();
    
    async function checkAuthStatus() {
      // Éviter les appels multiples
      if (authCheckInProgress) return;
      authCheckInProgress = true;
      
      try {
        // ✅ CORRECT: Pas de sessionId en param, juste credentials: 'include'
        const response = await fetch(`/api/auth/status`, { 
          credentials: 'include'  // Le cookie est envoyé automatiquement
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        console.log('Auth status:', data);
    
        if (data.authenticated) {
          // ✅ Le sessionId est dans la réponse, mais on n'a pas besoin de le stocker
          // On l'utilise juste pour les logs
          console.log('Connecté avec session:', data.sessionId);
          loadPlaylists(); // ✅ Plus besoin de passer le sessionId !
        } else {
          console.log('Non connecté');
          showLoginButton();
        }
      } catch (err) {
        console.error('Erreur vérification auth:', err);
        showLoginButton();
      } finally {
        authCheckInProgress = false;
      }
    }
    
    function showLoginButton() {
      if (googleContainer) googleContainer.style.display = 'block';
      if (googleButton) {
        googleButton.disabled = false;
        googleButton.textContent = "Login Google";
      }
    }
    
    // Charge les playlists
    async function loadPlaylists() {
      if (googleContainer) googleContainer?.remove();
      
      try {
        // ✅ CORRECT: fetchPlaylists n'a pas besoin de sessionId
        await fetchPlaylists(); 
      } catch (err) {
        console.error('Erreur chargement playlists:', err);
        
        // Si erreur 401, la session a expiré
        if (err.message?.includes('401')) {
          showLoginButton();
        }
      }
    }
    
    // Login via popup
    googleButton?.addEventListener("click", () => {
      openLoginPopup();
      googleButton.disabled = true;
      googleButton.textContent = "Connexion en cours...";
    });
    
    function openLoginPopup() {
      const width = 500;
      const height = 600;
      const left = (screen.width / 2) - (width / 2);
      const top = (screen.height / 2) - (height / 2);
    
      // Le serveur génère le cookie HTTP-only
      const authUrl = `/api/auth`;
    
      const popup = window.open(
        authUrl,
        'googleLogin',
        `width=${width},height=${height},top=${top},left=${left}`
      );
    
      // Timeout si l’utilisateur ferme la popup trop vite
      const timeoutId = setTimeout(() => {
        if (!popup || popup.closed) {
          googleButton.disabled = false;
          googleButton.textContent = "Login Google";
        }
      }, 5000);
    
      // Écoute le postMessage depuis le callback
      function onMessage(event) {
        // Vérifier l'origine pour la sécurité
        if (event.origin !== window.origin) {
          console.warn('Origine non conforme:', event.origin);
          return;
        }
    
        clearTimeout(timeoutId);
    
        if (event.data.success) {
          console.log("✅ Connexion OAuth réussie !");
          
          // ✅ PLUS BESOIN de stocker sessionId dans localStorage
          // Le cookie est déjà dans le navigateur (HTTP-only)
          
          // Vérifier le statut pour confirmer
          checkAuthStatus().then(() => {
            // Le bouton sera caché par checkAuthStatus si connecté
          });
    
          // Afficher un message de succès
          showNotification('Connexion réussie !', 'success');
        } else {
          console.error("❌ Échec de la connexion", event.data.error);
          googleButton.disabled = false;
          googleButton.textContent = "Login Google";
          showNotification('Échec de la connexion', 'error');
        }
    
        window.removeEventListener('message', onMessage);
      }
    
      window.addEventListener('message', onMessage);
      
      // Nettoyage si la popup est fermée manuellement
      const checkPopupClosed = setInterval(() => {
        if (popup.closed) {
          clearInterval(checkPopupClosed);
          window.removeEventListener('message', onMessage);
          clearTimeout(timeoutId);
          
          if (googleButton.disabled) {
            googleButton.disabled = false;
            googleButton.textContent = "Login Google";
          }
        }
      }, 500);
    }
    
    // Fonction utilitaire pour les notifications
    function showNotification(message, type = 'info') {
      const notification = document.createElement('div');
      notification.textContent = message;
      notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 12px 24px;
        border-radius: 8px;
        color: white;
        font-weight: 500;
        z-index: 9999;
        animation: slideIn 0.3s ease;
        ${type === 'success' ? 'background: #48bb78;' : ''}
        ${type === 'error' ? 'background: #f56565;' : ''}
        ${type === 'info' ? 'background: #4299e1;' : ''}
      `;
      
      // Ajouter l'animation
      const style = document.createElement('style');
      style.textContent = `
        @keyframes slideIn {
          from { transform: translateX(100%); opacity: 0; }
          to { transform: translateX(0); opacity: 1; }
        }
      `;
      document.head.appendChild(style);
      
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.style.animation = 'slideIn 0.3s ease reverse';
        setTimeout(() => notification.remove(), 300);
      }, 3000);
    }
    
    // Optionnel: Rafraîchir le statut périodiquement
    setInterval(checkAuthStatus, 30000); // Toutes les 5 minutes
  </script>
</body>
</html>
