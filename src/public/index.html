<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>YouTrieur - Login Google</title>
  <style>
    body {
      background: #121212;
      color: #fff;
      font-family: sans-serif;
      color-scheme: dark;
    }
    .order-overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 2;
      top: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: large;
      font-weight: bold;
      background-color: #00000078;
    }
    .logCont {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .GoogleBut {
      padding: 1em 2em;
      font-size: 1.5em;
      background: #ff0000;
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .GoogleBut:hover {
      transform: scale(1.05);
    }
    .GoogleBut:disabled {
      background: #888;
      color: #ddd;
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
      pointer-events: none;
    }
  </style>
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
  <div class="logCont" id="GoogleC">
    <button class="GoogleBut" id="ToGoogle">Login Google</button>
  </div>
  <script type="module" src="scripts/client.js"></script>
</body>
</html>
